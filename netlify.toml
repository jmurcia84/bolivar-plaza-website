[build]
  command = "npm run build"
  publish = "out"
  # Saltar el build si solo cambió content/ (commits del CMS)
  # Solo buildea cuando cambia código, estilos, config o dependencias
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src/ public/ package.json next.config.ts netlify.toml"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
